# Use H2 in-memory database for all tests
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop

# Disable Eureka service discovery
eureka.client.enabled=false
spring.cloud.discovery.enabled=false

# Disable mail auto-configuration
spring.mail.host=localhost
spring.mail.username=test@example.com
spring.mail.password=test
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration

# Frontend URL (used by ForumEmailService)
app.frontend.url=http://localhost:4200

# Disable OpenAI / external API calls (no real keys needed in tests)
openai.api.key=test-key
